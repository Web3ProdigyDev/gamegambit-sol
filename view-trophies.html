<!DOCTYPE html>
<html>
<head>
  <title>GameGambit Trophies</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a2e;
      color: white;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-top: 30px;
    }
    .trophy {
      background: white;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .trophy img {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }
    .trophy h3 {
      color: #333;
      margin: 15px 0 5px;
    }
    .trophy p {
      color: #666;
      font-size: 0.9em;
    }
    h1 {
      text-align: center;
      font-size: 3em;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>🏆 GameGambit Trophy Collection</h1>
  <p style="text-align: center; font-size: 1.2em;">Your Victory NFT Assets</p>
  
  <div class="gallery">
    <div class="trophy">
      <img src="https://gateway.pinata.cloud/ipfs/bafybeicdyog7bjcljl5i5c2bjwnpdzjobfx74igq4d3rr43xtojrblvbcm" alt="Bronze">
      <h3>Bronze Champion</h3>
      <p>0.01 - 0.1 SOL</p>
      <p>Common Rarity</p>
    </div>
    
    <div class="trophy">
      <img src="https://gateway.pinata.cloud/ipfs/bafybeifzryhfb6uetnd4vixcvcso6woyv6mfsr6f2473zdxs6wwyxdetam" alt="Silver">
      <h3>Silver Victor</h3>
      <p>0.1 - 1 SOL</p>
      <p>Uncommon Rarity</p>
    </div>
    
    <div class="trophy">
      <img src="https://gateway.pinata.cloud/ipfs/bafybeiah2dcbyq6yqluqkc46n7vg3vslgb356en6y6xtcuknl3xiedwu7m" alt="Gold">
      <h3>Gold Master</h3>
      <p>1 - 10 SOL</p>
      <p>Rare</p>
    </div>
    
    <div class="trophy">
      <img src="YOUR_DIAMOND_URI_HERE" alt="Diamond">
      <h3>Diamond Legend</h3>
      <p>10+ SOL</p>
      <p>Legendary</p>
    </div>
  </div>
</body>
</html>
